stages:
  - test
  - deploy

variables:
  APP_ENV: testing

before_script:
  - echo "Start CI/CD"

# ========================
# TESTING
# ========================
test_job:
  stage: test
  image: php:8.4-cli
  script:
    - echo "Run PHPUnit"
    - ./vendor/bin/phpunit
    # contoh Laravel:
    # - composer install
    # - php artisan test

# ========================
# DEPLOY
# ========================
deploy_job:
  stage: deploy
  script:
    - ssh $SERVER_USER@$SERVER_IP "
        cd /var/www/project &&
        git pull origin main &&
        php artisan migrate --force
      "